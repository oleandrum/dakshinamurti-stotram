literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    The entire universe, though abiding within one's own Self,
    appears, through māyā, as though projected outward, like a city
    reflected in a mirror. Just as, upon awakening from sleep,
    one directly realizes one's own Self, so this salutation is
    offered to Śrī Gurumūrti, to Śrī Dakṣiṇāmūrti.
