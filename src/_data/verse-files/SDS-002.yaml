literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Just as a sprout exists unmanifest within a seed, so too this
    universe existed before creation in an undifferentiated state.
    Thereafter, through the imagined distinctions of space and time
    projected by māyā, it appears as a manifold creation. Like a
    magician, or like a great yogi, He manifests it solely by His own
    free will. To that Śrī Gurumūrti, to Śrī Dakṣiṇāmūrti, this
    salutation is offered.
