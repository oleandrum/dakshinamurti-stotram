document:
  id: sri-dakshinamurti-stotram

verse:
  id: SDS-003
  order: 3
  display_number: "॥ ३ ॥"

source:
  devanagari: |
    यस्यैव स्फुरणं सदात्मकमसत्कल्पार्थकं भासते
    साक्षात्तत्त्वमसीति वेदवचसा यो बोधयत्याश्रितान् ।
    यत्साक्षात्करणाद्भवेन्न पुनरावृत्तिर्भवाम्भोनिधौ
    तस्मै श्रीगुरुमूर्तये नम इदं श्रीदक्षिणामूर्तये ॥

  iast: |
    yasyaiva sphuraṇaṃ sadātmakam asatkalpārthakaṃ bhāsate
    sākṣāt tattvam asīti vedavacasā yo bodhayaty āśritān |
    yatsākṣātkaraṇād bhaven na punarāvṛttir bhavāmbhonidhau
    tasmai śrī-gurumūrtaye nama idaṃ śrī-dakṣiṇāmūrtaye ||

