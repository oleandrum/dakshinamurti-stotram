literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    That very Self, whose luminous manifestation is of the nature of
    absolute Being, appears as though the unreal were real. He who,
    through the Vedic declaration "Tat Tvam Asi", directly instructs
    those who seek refuge in Him, revealing their true identity—by
    whose direct realization there is no return to the ocean of worldly
    existence—to that Śrī Gurumūrti, to Śrī Dakṣiṇāmūrti, this
    salutation is offered.
