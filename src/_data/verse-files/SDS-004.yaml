document:
  id: sri-dakshinamurti-stotram

verse:
  id: SDS-004
  order: 4
  display_number: "॥ ४ ॥"

source:
  devanagari: |
    नानाच्छिद्रघटोदरस्थितमहादीपप्रभाभास्वरं
    ज्ञानं यस्य तु चक्षुरादिकरणद्वारा बहिः स्पन्दते ।
    जानामीति तमेव भान्तमनुभात्येतत्समस्तं जगत्
    तस्मै श्रीगुरुमूर्तये नम इदं श्रीदक्षिणामूर्तये ॥

  iast: |
    nānācchidraghaṭodarasthitamahādīpaprabhābhāsvaraṃ
    jñānaṃ yasya tu cakṣurādikaraṇadvārā bahiḥ spandate |
    jānāmīti tameva bhāntam anubhāty etat samastaṃ jagat
    tasmai śrī-gurumūrtaye nama idaṃ śrī-dakṣiṇāmūrtaye ||

