literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Just as the radiant light of a great lamp, shining from within a
    pot through its many apertures, streams outward, so too the light
    of Consciousness manifests itself through the gateways of the eye
    and the other sense organs. It is by His light alone that the
    thought "I know" arises, and by His shining this entire universe
    is illumined. To that Śrī Gurumūrti, to Śrī Dakṣiṇāmūrti, this
    salutation is offered.
