document:
  id: sri-dakshinamurti-stotram

verse:
  id: SDS-005
  order: 5
  display_number: "॥ ५ ॥"

source:
  devanagari: |
    देहं प्राणमपीन्द्रियाण्यपि चलां बुद्धिं च शून्यं विदुः
    स्त्रीबालान्धजडोपमास्त्वहमिति भ्रान्ता भृशं वादिनः ।
    मायाशक्तिविलासकल्पितमहाव्यामोहसंहारिणे
    तस्मै श्रीगुरुमूर्तये नम इदं श्रीदक्षिणामूर्तये ॥

  iast: |
    dehaṃ prāṇam apīndriyāṇy api calāṃ buddhiṃ ca śūnyaṃ viduḥ
    strībālāndhajaḍopamās tv aham iti bhrāntā bhṛśaṃ vādinaḥ |
    māyāśaktivilāsakalpitamahāvyāmohasaṃhāriṇe
    tasmai śrī-gurumūrtaye nama idaṃ śrī-dakṣiṇāmūrtaye ||

