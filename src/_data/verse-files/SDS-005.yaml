literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Some identify the Self with the body, others with the vital breath,
    the senses, the ever-changing intellect, or even with the void.
    Such disputants, greatly deluded and resembling women, children,
    the blind, and the dull-witted, remain confused by the notion
    "I am this." To Him who destroys the great delusion projected
    through the playful power of māyā, to Śrī Gurumūrti, to
    Śrī Dakṣiṇāmūrti, this salutation is offered.
