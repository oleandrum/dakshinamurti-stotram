literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Like the sun or the moon obscured by Rāhu, the Self, though pure
    Being alone, appears concealed through the covering power of māyā.
    When the activities of the sense organs are withdrawn, a person
    abides in deep sleep. Yet upon awakening one recognizes,
    "I slept before." To Him by whom this continuity of awareness is
    made evident, to Śrī Gurumūrti, to Śrī Dakṣiṇāmūrti, this
    salutation is offered.
