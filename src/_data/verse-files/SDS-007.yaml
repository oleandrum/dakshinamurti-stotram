document:
  id: sri-dakshinamurti-stotram

verse:
  id: SDS-007
  order: 7
  display_number: "॥ ७ ॥"

source:
  devanagari: |
    बाल्यादिष्वपि जाग्रदादिषु तथा सर्वास्ववस्थास्वपि
    व्यावृत्तास्वनुवर्तमानमहमीत्यन्तः स्फुरन्तं सदा ।
    स्वात्मानं प्रकटीकरोति भजतां यो मुद्रया भद्रया
    तस्मै श्रीगुरुमूर्तये नम इदं श्रीदक्षिणामूर्तये ॥

  iast: |
    bālyādiṣvapi jāgradādiṣu tathā sarvāsvavasthāsvapi
    vyāvṛttāsvanuvartamānamahamītyantaḥ sphurantaṃ sadā |
    svātmānaṃ prakaṭīkaroti bhajatāṃ yo mudrayā bhadrayā
    tasmai śrī-gurumūrtaye nama idaṃ śrī-dakṣiṇāmūrtaye ||

