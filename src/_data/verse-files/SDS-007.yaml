literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Through childhood, youth, and the other stages of life; through
    the waking, dream, and deep sleep states; indeed through all
    changing conditions, there ever shines within the unbroken
    awareness, "I am." He who reveals one's own true Self to those
    devoted to Him by means of the auspicious gesture (jñāna-mudrā),
    to that Śrī Gurumūrti, to Śrī Dakṣiṇāmūrti, this salutation is
    offered.
