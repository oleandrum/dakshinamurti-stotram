literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Deluded by māyā, this person perceives the universe in terms of
    duality: as cause and effect, owner and possessed, teacher and
    disciple, father and son, and countless other distinctions. Whether
    in dream or in the waking state, these apparent differences persist
    only through ignorance. To Him who is the Reality underlying all
    such distinctions, to Śrī Gurumūrti, to Śrī Dakṣiṇāmūrti, this
    salutation is offered.
