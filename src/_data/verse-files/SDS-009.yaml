literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Earth, water, fire, air, space, the sun, the moon, and the
    individual being—these eight comprise His manifold manifestation,
    embracing all that is moving and unmoving. Beyond this all-pervading
    Reality there exists nothing whatsoever for those who inquire into
    the Truth. To that Supreme, all-pervading Śrī Gurumūrti, to Śrī
    Dakṣiṇāmūrti, this salutation is offered.
