literary_translation:
  language: en
  version: 1.0.0
  status: canonical

  text: >
    Since this hymn clearly reveals the truth that the Self is the Self
    of all, by hearing it, reflecting upon its meaning, meditating upon
    it, and reciting it, one naturally attains the realization of
    universal Selfhood together with the majesty of the Supreme Lord.
    Thereby arises unobstructed sovereignty, unfolding as the eightfold
    divine powers.
